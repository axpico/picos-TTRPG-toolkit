name: Node app

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare env
        shell: bash
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

          SESSION_KEY=$(node -e "console.log(require('crypto').randomBytes(32).toString('base64'))")

          if grep -q '^SESSION_KEY=' .env; then
            sed -i "s|^SESSION_KEY=.*|SESSION_KEY=\"$SESSION_KEY\"|" .env
          else
            echo "SESSION_KEY=\"$SESSION_KEY\"" >> .env
          fi

      - name: Run migrations
        run: npm run migrate

      - name: Start dev server
        run: npm run dev &

      - name: Wait a few seconds
        run: sleep 10
