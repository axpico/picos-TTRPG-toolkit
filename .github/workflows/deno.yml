name: Node app

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Copy env
        run: cp .env.example .env

      - name: Run migrations
        run: npm run migrate

      - name: Start dev server
        run: npm run dev &

      - name: Wait a few seconds
        run: sleep 10
