name: Node app

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare env
        shell: bash
        run: |
          # SESSION_KEY is auto-generated by the server when blank, so we only
          # need DATABASE_URL (and friends) from the example file.
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo 'DATABASE_URL="file:./data/app.db"' > .env
          fi

      - name: Run migrations (applies schema + generates Prisma client)
        run: npm run migrate

      - name: Build (shared + server + web)
        run: npm run build

      - name: Typecheck (all workspaces)
        run: npm run check

      - name: Run all tests
        run: npm test
